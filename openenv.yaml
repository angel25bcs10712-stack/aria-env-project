name: aria-env
version: 2.0.0
description: >
  ARIA — An RL environment that trains LLMs to complete enterprise workflows,
  even when rules change mid-task. Built on OpenEnv for the Meta PyTorch
  OpenEnv Hackathon x Scaler 2026.

author:
  name: Angel Singh
  email: angel25bcs10712@gmail.com

environment:
  entry_point: environment.aria_env:ARIAEnvironment
  server: server.py
  app: app.py

tools:
  - email
  - calendar
  - document
  - spreadsheet
  - policy

rewards:
  - name: task_completion
    weight: 0.4
    description: Measures whether tasks are completed correctly.
  - name: efficiency
    weight: 0.2
    description: Measures how efficiently tasks are completed (min tool calls).
  - name: adaptation
    weight: 0.2
    description: Measures whether agent detects and adapts to policy changes.
  - name: anti_hacking
    weight: 0.2
    description: Penalizes looping, gaming, and suspicious behavior.

training:
  algorithm: GRPO
  framework: HuggingFace TRL
  base_model: Qwen/Qwen2.5-1.5B-Instruct
  curriculum_stages: 3

links:
  github: https://github.com/angel25bcs10712-stack/aria-env-project